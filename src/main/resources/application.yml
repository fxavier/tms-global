spring:
  application:
    name: tms-global
  datasource:
    url: ${TMS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tms_dev}
    username: ${TMS_DATASOURCE_USERNAME:tms_dev}
    password: ${TMS_DATASOURCE_PASSWORD:tms_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TmsHikariPool
      maximum-pool-size: ${TMS_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${TMS_DATASOURCE_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${TMS_SECURITY_JWT_ISSUER_URI:http://localhost:8081/realms/tms}
          jwk-set-uri: ${TMS_SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/tms/protocol/openid-connect/certs}

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","thread":"%t","message":"%replace(%m%wEx){''[\r\n]+'',''\\n''}"}%n'
  level:
    root: INFO
    pt.xavier.tms: INFO
    org.hibernate.SQL: INFO

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    persist-authorization: true
    oauth:
      client-id: ${TMS_SWAGGER_OAUTH_CLIENT_ID:tms-api}
      client-secret: ${TMS_SWAGGER_OAUTH_CLIENT_SECRET:Zp8WBTZbe6lX6MIYcI7YqbV9eBOFmkyd}
      scopes:
        - openid
        - profile
        - email

tms:
  user:
    services:
      enabled: ${TMS_USER_SERVICES_ENABLED:true}
    controllers:
      enabled: ${TMS_USER_CONTROLLERS_ENABLED:true}
    superuser-init:
      enabled: ${TMS_USER_SUPERUSER_INIT_ENABLED:false}
  superuser:
    username: ${TMS_SUPERUSER_USERNAME:}
    password: ${TMS_SUPERUSER_PASSWORD:}
    email: ${TMS_SUPERUSER_EMAIL:}
  keycloak:
    admin:
      server-url: ${TMS_KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8081}
      realm: ${TMS_KEYCLOAK_ADMIN_REALM:tms}
      client-id: ${TMS_KEYCLOAK_ADMIN_CLIENT_ID:tms-admin-cli}
      client-secret: ${TMS_KEYCLOAK_ADMIN_CLIENT_SECRET:tms-admin-cli-secret}
      username: ${TMS_KEYCLOAK_ADMIN_USERNAME:}
      password: ${TMS_KEYCLOAK_ADMIN_PASSWORD:}
  storage:
    type: ${TMS_STORAGE_TYPE:local}
    max-file-size-bytes: ${TMS_STORAGE_MAX_FILE_SIZE_BYTES:10485760}
    local:
      base-path: ${TMS_STORAGE_LOCAL_BASE_PATH:./storage/uploads}
    s3:
      bucket: ${TMS_STORAGE_S3_BUCKET:}
      prefix: ${TMS_STORAGE_S3_PREFIX:uploads/}
  security:
    rate-limit:
      enabled: ${TMS_SECURITY_RATE_LIMIT_ENABLED:true}
      capacity: ${TMS_SECURITY_RATE_LIMIT_CAPACITY:60}
      refill-tokens: ${TMS_SECURITY_RATE_LIMIT_REFILL_TOKENS:60}
      refill-period-seconds: ${TMS_SECURITY_RATE_LIMIT_REFILL_PERIOD_SECONDS:60}
