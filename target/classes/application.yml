spring:
  application:
    name: tms-global
  datasource:
    url: ${TMS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tms_dev}
    username: ${TMS_DATASOURCE_USERNAME:tms_dev}
    password: ${TMS_DATASOURCE_PASSWORD:tms_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TmsHikariPool
      maximum-pool-size: ${TMS_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${TMS_DATASOURCE_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${TMS_SECURITY_JWT_ISSUER_URI:http://localhost:8081/realms/tms}
          jwk-set-uri: ${TMS_SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/tms/protocol/openid-connect/certs}

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","thread":"%t","message":"%replace(%m%wEx){''[\r\n]+'',''\\n''}"}%n'
  level:
    root: INFO
    pt.xavier.tms: INFO
    org.hibernate.SQL: INFO

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

tms:
  storage:
    type: ${TMS_STORAGE_TYPE:local}
    max-file-size-bytes: ${TMS_STORAGE_MAX_FILE_SIZE_BYTES:10485760}
    local:
      base-path: ${TMS_STORAGE_LOCAL_BASE_PATH:./storage/uploads}
    s3:
      bucket: ${TMS_STORAGE_S3_BUCKET:}
      prefix: ${TMS_STORAGE_S3_PREFIX:uploads/}
  security:
    rate-limit:
      enabled: ${TMS_SECURITY_RATE_LIMIT_ENABLED:true}
      capacity: ${TMS_SECURITY_RATE_LIMIT_CAPACITY:60}
      refill-tokens: ${TMS_SECURITY_RATE_LIMIT_REFILL_TOKENS:60}
      refill-period-seconds: ${TMS_SECURITY_RATE_LIMIT_REFILL_PERIOD_SECONDS:60}
  integration:
    rh:
      mode: ${TMS_INTEGRATION_RH_MODE:module}
      base-url: ${TMS_INTEGRATION_RH_BASE_URL:http://localhost:8082}
      availability-path: ${TMS_INTEGRATION_RH_AVAILABILITY_PATH:/api/v1/drivers/availability}
      api-key: ${TMS_INTEGRATION_RH_API_KEY:}
      cache-ttl-minutes: ${TMS_INTEGRATION_RH_CACHE_TTL_MINUTES:5}
      connect-timeout-millis: ${TMS_INTEGRATION_RH_CONNECT_TIMEOUT_MILLIS:3000}
      read-timeout-millis: ${TMS_INTEGRATION_RH_READ_TIMEOUT_MILLIS:5000}
